name: Compile firmware

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install adafruit-nrfutil (DFU packaging tool the core invokes)
        run: pip install adafruit-nrfutil

      - name: Install nice!nano v2 core
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/JeralInnovations/nicenano-v2-arduino/master/package_nicenano_index.json
          arduino-cli core update-index
          arduino-cli core install nicenano:nrf52

      - name: Compile sketch
        run: |
          arduino-cli compile \
            --fqbn nicenano:nrf52:nicenanov2pf \
            firmware/Chronograph
