name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        run: gradle -p android assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: chrono-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # Keep a "latest" release updated so the APK can be downloaded
      # directly on a phone from the repo's Releases page.
      - name: Publish latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create latest android/app/build/outputs/apk/debug/app-debug.apk \
            --repo "$GITHUB_REPOSITORY" \
            --title "Latest app build" \
            --notes "Auto-built APK. Download on your Android phone and open it to install." \
          || gh release upload latest android/app/build/outputs/apk/debug/app-debug.apk \
            --repo "$GITHUB_REPOSITORY" --clobber
